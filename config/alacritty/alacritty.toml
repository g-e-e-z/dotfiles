[terminal.shell]
program = "/opt/homebrew/bin/zsh"
args = ["-l", "-c", "export PATH=$PATH:/opt/homebrew/bin && tmux a || tmux new-session; exec zsh"]

[font]
size = 25

[font.normal]
family = "UbuntuMono Nerd Font"

[window]
decorations = "none"
startup_mode = "Maximized"
opacity = 0.95

[window.padding]
x = 7
y = 0

[general]
import = ["~/.config/alacritty/themes/gruvbox_dark.toml"]

[terminal]
