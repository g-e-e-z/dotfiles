format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "fg:#b8bb26" # Gruvbox green

[character]
success_symbol = "[‚ùØ](fg:#fabd2f)"     # Gruvbox yellow
error_symbol = "[‚ùØ](fg:#fb4934)"       # Gruvbox red
vimcmd_symbol = "[‚ùÆ](fg:#83a598)"      # Gruvbox blue
[git_branch]
format = "[$branch]($style)"
